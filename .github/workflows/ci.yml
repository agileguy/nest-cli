name: CI

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Guard against real credentials in CI
        shell: bash
        run: |
          if [ -n "${NEST_CLI_TEST_OAUTH_CREDENTIALS:-}" ] || \
             [ -n "${GOOGLE_APPLICATION_CREDENTIALS:-}" ] || \
             [ -n "${NEST_CLI_TEST_FOYER_TOKEN:-}" ]; then
            echo "::error::Real credentials must NOT be present in CI."
            exit 1
          fi
          echo "Credential guard passed (no real-credential env vars present)."

      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --all-extras --dev

      - name: Lint (ruff check)
        run: uv run ruff check .

      - name: Format check (ruff format --check)
        run: uv run ruff format --check .

      - name: Type check (mypy)
        run: uv run mypy nest_cli

      - name: Test (pytest)
        run: uv run pytest -v
